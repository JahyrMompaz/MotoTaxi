name: Despliegue Frontend React

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código del repositorio
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Ajusta a la versión que utilices

      - name: Instalar dependencias y Compilar (Se ejecuta en GitHub)
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Copiar carpeta build al servidor de producción
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: "./build/" # O build/* si cambiaste la config de Vite
          server-dir: "./domains/desarrollos-404.com/public_html/sanjuan"