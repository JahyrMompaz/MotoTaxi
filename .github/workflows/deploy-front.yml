name: Despliegue Frontend React

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código del repositorio
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Ajusta a la versión que utilices

      - name: Instalar dependencias y Compilar (Se ejecuta en GitHub)
        run: |
          npm install
          npm run build

      - name: Copiar carpeta dist al servidor de producción
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 65002
          source: "build/*" # O build/* si cambiaste la config de Vite
          target: "/domains/desarrollos-404.com/public_html/sanjuan"
          strip_components: 1 # Evita crear una subcarpeta "dist" en el servidor